name: seed_ui
description: "Seed - Direct-to-client lending product by Antinvestor"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.9
  antinvestor_ui_core: ^0.2.0
  antinvestor_ui_audit: ^0.2.0
  antinvestor_ui_identity:
    path: ../identity
  antinvestor_api_common: ^1.52.0
  antinvestor_api_files: ^1.54.0
  connectrpc: ^1.0.0
  fixnum: ^1.1.0
  image_picker: ^1.1.2
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  go_router: ^17.2.0
  google_fonts: ^8.0.2
  http: ^1.6.0
  openid_client: ^0.4.10
  protobuf: ^4.2.0
  logger: ^2.7.0
  web: ^1.1.1
  app_links: ^7.0.0
  riverpod_annotation: ^4.0.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  antinvestor_ui_core:
    path: ../../../common/ui_core
  antinvestor_api_identity:
    path: ../../sdk/dart/identity

flutter:
  uses-material-design: true
