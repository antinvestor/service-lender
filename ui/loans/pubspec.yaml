name: antinvestor_ui_loans
description: >
  Loan management UI library for Antinvestor. Embeddable screens and widgets
  for loan products, requests, accounts, disbursements, repayments, penalties,
  schedules, restructuring, portfolio reporting, and dashboard.
version: 0.1.0
repository: https://github.com/antinvestor/service-fintech
homepage: https://github.com/antinvestor/service-fintech/tree/main/ui/loans
issue_tracker: https://github.com/antinvestor/service-fintech/issues
topics:
  - flutter
  - ui
  - loans
  - antinvestor
  - fintech

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  antinvestor_ui_core: ^0.2.0
  antinvestor_api_loans: ^0.2.0
  antinvestor_api_common: ^1.52.0
  connectrpc: ^1.0.0
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.0
  protobuf: ^4.2.0
  fixnum: ^1.1.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
