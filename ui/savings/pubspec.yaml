name: antinvestor_ui_savings
description: >
  Savings management UI library for Antinvestor. Embeddable screens and widgets
  for savings accounts, products, deposits, and withdrawals.
version: 0.1.0
repository: https://github.com/antinvestor/service-fintech
homepage: https://github.com/antinvestor/service-fintech/tree/main/ui/savings
issue_tracker: https://github.com/antinvestor/service-fintech/issues
topics:
  - flutter
  - ui
  - savings
  - antinvestor
  - admin

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  antinvestor_ui_core: ^0.2.0
  antinvestor_api_savings: ^0.1.0
  antinvestor_api_common: ^1.52.0
  connectrpc: ^1.0.0
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.0
  protobuf: ^4.2.0
  fixnum: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
