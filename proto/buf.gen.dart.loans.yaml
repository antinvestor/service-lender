# Per-module dart codegen for loans. Invoked by proto-generate-dart as:
#   buf generate --template buf.gen.dart.loans.yaml loans
# The positional input scopes generation to this module only.
version: v2
managed:
  enabled: true

plugins:
  - remote: buf.build/protocolbuffers/dart:v21.1.2
    out: ../sdk/dart/loans/lib/src
    include_imports: true
    include_wkt: true

  - remote: buf.build/connectrpc/dart
    out: ../sdk/dart/loans/lib/src
    include_imports: true
    include_wkt: true
