# This file intentionally holds no plugins. Each dart SDK package gets its
# own buf.gen.dart.<module>.yaml so that generation is scoped to a single
# module and dart packages don't leak each other's types.
#
# Local Go generation (used during proto development) lives in
# buf.gen.local-go.yaml.
#
# Production Go consumers use the BSR-published modules under
# buf.build/gen/go/antinvestor/<module>/... — see go.mod.
version: v2
managed:
  enabled: true
plugins: []
