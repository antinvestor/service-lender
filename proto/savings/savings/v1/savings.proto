}

// -----------------------------------------------------
// Savings Service
// -----------------------------------------------------

// SavingsService manages savings products, accounts, deposits, withdrawals,
// and interest accruals.
// All RPCs require authentication via Bearer token.
service SavingsService {
  option (common.v1.service_permissions) = {
    namespace: "service_savings"
    permissions: [
      "savings_product_view",
      "savings_product_manage",
      "savings_account_view",
      "savings_account_manage",
      "deposit_view",
      "deposit_manage",
      "withdrawal_view",
      "withdrawal_manage",
      "interest_view",
      "savings_balance_view"
    ]
    role_bindings: [
      {
        role: ROLE_OWNER
        permissions: [
          "savings_product_view",
          "savings_product_manage",
          "savings_account_view",
          "savings_account_manage",
          "deposit_view",
          "deposit_manage",
          "withdrawal_view",
          "withdrawal_manage",
          "interest_view",
          "savings_balance_view"
        ]
      },
      {
        role: ROLE_ADMIN
        permissions: [
          "savings_product_view",
          "savings_product_manage",
          "savings_account_view",
          "savings_account_manage",
          "deposit_view",
          "deposit_manage",
          "withdrawal_view",
          "withdrawal_manage",
          "interest_view",
          "savings_balance_view"
        ]
      },
      {
        role: ROLE_OPERATOR
        permissions: [
          "savings_product_view",
          "savings_account_view",
          "deposit_view",
          "deposit_manage",
          "withdrawal_view",
          "withdrawal_manage",
          "interest_view",
          "savings_balance_view"
        ]
      },
      {
        role: ROLE_VIEWER
        permissions: [
          "savings_product_view",
          "savings_account_view",
          "deposit_view",
          "withdrawal_view",
          "interest_view",
          "savings_balance_view"
        ]
      },
      {
        role: ROLE_MEMBER
        permissions: [
          "savings_product_view",
          "savings_account_view",
          "deposit_view",
          "withdrawal_view",
          "interest_view",
          "savings_balance_view"
        ]
      },
      {
        role: ROLE_SERVICE
        permissions: [
          "savings_product_view",
          "savings_product_manage",
          "savings_account_view",
          "savings_account_manage",
          "deposit_view",
          "deposit_manage",
          "withdrawal_view",
          "withdrawal_manage",
          "interest_view",
          "savings_balance_view"
        ]
      }
    ]
  };

  // SavingsProductSave creates or updates a savings product.
  rpc SavingsProductSave(SavingsProductSaveRequest) returns (SavingsProductSaveResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["savings_product_manage"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "savingsProductSave"
      summary: "Create or update a savings product"
      description: "Creates a new savings product or updates an existing one. Savings products define terms, rates, and withdrawal rules."
      tags: "SavingsProducts"
    };
  }

  // SavingsProductGet retrieves a savings product by its ID.
  rpc SavingsProductGet(SavingsProductGetRequest) returns (SavingsProductGetResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["savings_product_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "savingsProductGet"
      summary: "Get a savings product by ID"
      description: "Retrieves a savings product record by its unique identifier."
      tags: "SavingsProducts"
    };
  }

  // SavingsProductSearch finds savings products matching search criteria.
  rpc SavingsProductSearch(SavingsProductSearchRequest) returns (stream SavingsProductSearchResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["savings_product_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "savingsProductSearch"
      summary: "Search savings products"
      description: "Searches for savings products matching specified criteria."
      tags: "SavingsProducts"
    };
  }

  // SavingsAccountCreate creates a new savings account.
  rpc SavingsAccountCreate(SavingsAccountCreateRequest) returns (SavingsAccountCreateResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["savings_account_manage"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "savingsAccountCreate"
      summary: "Create a savings account"
      description: "Creates a new savings account for an individual or group."
      tags: "SavingsAccounts"
    };
  }

  // SavingsAccountGet retrieves a savings account by its ID.
  rpc SavingsAccountGet(SavingsAccountGetRequest) returns (SavingsAccountGetResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["savings_account_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "savingsAccountGet"
      summary: "Get a savings account by ID"
      description: "Retrieves a savings account record by its unique identifier."
      tags: "SavingsAccounts"
    };
  }

  // SavingsAccountSearch finds savings accounts matching search criteria.
  rpc SavingsAccountSearch(SavingsAccountSearchRequest) returns (stream SavingsAccountSearchResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["savings_account_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "savingsAccountSearch"
      summary: "Search savings accounts"
      description: "Searches for savings accounts. Supports filtering by owner, product, bank, and status."
      tags: "SavingsAccounts"
    };
  }

  // SavingsAccountFreeze freezes a savings account.
  rpc SavingsAccountFreeze(SavingsAccountFreezeRequest) returns (SavingsAccountFreezeResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["savings_account_manage"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "savingsAccountFreeze"
      summary: "Freeze a savings account"
      description: "Freezes a savings account, preventing deposits and withdrawals."
      tags: "SavingsAccounts"
    };
  }

  // SavingsAccountClose closes a savings account.
  rpc SavingsAccountClose(SavingsAccountCloseRequest) returns (SavingsAccountCloseResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["savings_account_manage"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "savingsAccountClose"
      summary: "Close a savings account"
      description: "Closes a savings account permanently."
      tags: "SavingsAccounts"
    };
  }

  // DepositRecord records a deposit into a savings account.
  rpc DepositRecord(DepositRecordRequest) returns (DepositRecordResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["deposit_manage"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "depositRecord"
      summary: "Record a deposit"
      description: "Records a deposit into a savings account."
      tags: "Deposits"
    };
  }

  // DepositGet retrieves a deposit by its ID.
  rpc DepositGet(DepositGetRequest) returns (DepositGetResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["deposit_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "depositGet"
      summary: "Get a deposit by ID"
      description: "Retrieves a deposit record by its unique identifier."
      tags: "Deposits"
    };
  }

  // DepositSearch finds deposits for a savings account.
  rpc DepositSearch(DepositSearchRequest) returns (stream DepositSearchResponse) {
