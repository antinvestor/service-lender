syntax = "proto3";

package savings.v1;

// -----------------------------------------------------
// Core notes (normative):
// - Savings Service manages savings products, accounts, deposits, withdrawals,
//   and interest accruals
// - Handles the full savings account lifecycle from creation through to closure
// - Integrates with Identity, Ledger, Payment, and Notification services
// - All timestamps are RFC3339 / google.protobuf.Timestamp
// - All monetary amounts use google.type.Money for precision
// - All rates are decimal percentage strings (e.g. "12.50" = 12.50%)
// -----------------------------------------------------

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "common/v1/permissions.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/struct.proto";
import "google/type/money.proto";

option go_package = "github.com/antinvestor/apis/go/savings/v1;savingsv1";
option java_multiple_files = true;
option java_package = "savingsv1";
option (gnostic.openapi.v3.document) = {
  info: {
    title: "Lender Savings Service"
    version: "v1.0.0"
    description: "The Lender Savings Service manages savings products, accounts, deposits, withdrawals, and interest accruals. It supports individual and group savings accounts with configurable product terms."
    contact: {
      name: "Ant Investor Ltd"
      url: "https://github.com/antinvestor/service-lender"
      email: "info@antinvestor.com"
    }
    license: {
      name: "Apache License"
      url: "https://github.com/antinvestor/apis/blob/master/LICENSE"
    }
  }
  components: {
    security_schemes: {
      additional_properties: [
        {
          name: "BearerAuth"
          value: {
            security_scheme: {
              type: "http"
              scheme: "bearer"
              bearer_format: "JWT"
            }
          }
        }
      ]
    }
  }
};

// -----------------------------------------------------
// Enumerations
// -----------------------------------------------------

// SavingsPeriodType defines the savings collection frequency.
enum SavingsPeriodType {
  SAVINGS_PERIOD_TYPE_UNSPECIFIED = 0;
  SAVINGS_PERIOD_TYPE_DAILY = 1;
  SAVINGS_PERIOD_TYPE_WEEKLY = 2;
  SAVINGS_PERIOD_TYPE_BIWEEKLY = 3;
  SAVINGS_PERIOD_TYPE_MONTHLY = 4;
  SAVINGS_PERIOD_TYPE_QUARTERLY = 5;
}

// CompoundingFrequency defines how often interest is compounded.
enum CompoundingFrequency {
  COMPOUNDING_FREQUENCY_UNSPECIFIED = 0;
  COMPOUNDING_FREQUENCY_DAILY = 1;
  COMPOUNDING_FREQUENCY_WEEKLY = 2;
  COMPOUNDING_FREQUENCY_MONTHLY = 3;
  COMPOUNDING_FREQUENCY_QUARTERLY = 4;
  COMPOUNDING_FREQUENCY_ANNUALLY = 5;
}

// SavingsAccountOwnerType defines the type of account owner.
enum SavingsAccountOwnerType {
  SAVINGS_ACCOUNT_OWNER_TYPE_UNSPECIFIED = 0;
  SAVINGS_ACCOUNT_OWNER_TYPE_INDIVIDUAL = 1;
  SAVINGS_ACCOUNT_OWNER_TYPE_GROUP = 2;
}

// SavingsAccountStatus defines the status of a savings account.
enum SavingsAccountStatus {
  SAVINGS_ACCOUNT_STATUS_UNSPECIFIED = 0;
  SAVINGS_ACCOUNT_STATUS_ACTIVE = 1;
  SAVINGS_ACCOUNT_STATUS_FROZEN = 2;
  SAVINGS_ACCOUNT_STATUS_CLOSED = 3;
}

// DepositStatus defines the status of a deposit.
enum DepositStatus {
  DEPOSIT_STATUS_UNSPECIFIED = 0;
  DEPOSIT_STATUS_PENDING = 1;
  DEPOSIT_STATUS_COMPLETED = 2;
  DEPOSIT_STATUS_REVERSED = 3;
}

// WithdrawalStatus defines the status of a withdrawal.
enum WithdrawalStatus {
  WITHDRAWAL_STATUS_UNSPECIFIED = 0;
  WITHDRAWAL_STATUS_PENDING = 1;
  WITHDRAWAL_STATUS_APPROVED = 2;
  WITHDRAWAL_STATUS_COMPLETED = 3;
  WITHDRAWAL_STATUS_REJECTED = 4;
  WITHDRAWAL_STATUS_REVERSED = 5;
}

// -----------------------------------------------------
// Entity Messages
// -----------------------------------------------------

// SavingsProductObject defines savings terms, rates, and rules for a bank.
message SavingsProductObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string organization_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string name = 3 [(buf.validate.field).string.min_len = 1];
  string code = 4 [(buf.validate.field).string.min_len = 1];
  string description = 5;
  string currency_code = 6 [(buf.validate.field).string.len = 3]; // ISO 4217
  string interest_rate = 7; // Annual interest rate as decimal percentage e.g. "5.50"
  CompoundingFrequency compounding_frequency = 8;
  SavingsPeriodType period_type = 9;
  google.type.Money min_deposit = 10;
  google.type.Money max_deposit = 11;
  google.protobuf.Struct withdrawal_rules = 12;
  common.v1.STATE state = 13;
  google.protobuf.Struct properties = 14;
}

// SavingsAccountObject represents an individual or group savings account.
message SavingsAccountObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string product_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string owner_id = 3 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  SavingsAccountOwnerType owner_type = 4;
  string organization_id = 5 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string branch_id = 6 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string agent_id = 7 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string currency_code = 8 [(buf.validate.field).string.len = 3];
  SavingsAccountStatus status = 9;
  string ledger_account_id = 10;
  string payment_account_ref = 11;
  google.protobuf.Struct properties = 12;
}

// DepositObject records a deposit into a savings account.
message DepositObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string savings_account_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  google.type.Money amount = 3;
  reserved 4;
  DepositStatus status = 5;
  string payment_reference = 6;
  string ledger_transaction_id = 7;
  string channel = 8;
  string payer_reference = 9;
  string idempotency_key = 10;
  google.protobuf.Struct properties = 11;
}

// WithdrawalObject records a withdrawal from a savings account.
message WithdrawalObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string savings_account_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  google.type.Money amount = 3;
  reserved 4;
  WithdrawalStatus status = 5;
  string payment_reference = 6;
  string ledger_transaction_id = 7;
  string channel = 8;
  string recipient_reference = 9;
  string reason = 10;
  string idempotency_key = 11;
  google.protobuf.Struct properties = 12;
}

// InterestAccrualObject records periodic interest accrued on a savings account.
message InterestAccrualObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string savings_account_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  google.type.Money amount = 3;
  string period_start = 4; // RFC3339
  string period_end = 5; // RFC3339
  string rate_applied = 6; // Decimal percentage e.g. "5.50"
  google.type.Money balance_used = 7; // Balance used for computation
  string ledger_transaction_id = 8;
  google.protobuf.Struct properties = 9;
}

// SavingsBalanceObject represents the current balance of a savings account.
message SavingsBalanceObject {
  string savings_account_id = 1;
  google.type.Money available_balance = 2;
  google.type.Money total_deposits = 3;
  google.type.Money total_withdrawals = 4;
  google.type.Money total_interest = 5;
  string last_calculated_at = 6;
}

// SavingsStatementEntry represents a single line in a savings statement.
message SavingsStatementEntry {
  string date = 1;
  string description = 2;
  google.type.Money debit = 3;
  google.type.Money credit = 4;
  google.type.Money balance = 5;
  string reference = 6;
}

// -----------------------------------------------------
// Request/Response Messages
// -----------------------------------------------------

// --- SavingsProduct ---

message SavingsProductSaveRequest {
  SavingsProductObject data = 1 [(buf.validate.field).required = true];
}

message SavingsProductSaveResponse {
  SavingsProductObject data = 1;
}

message SavingsProductGetRequest {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
}

message SavingsProductGetResponse {
  SavingsProductObject data = 1;
}

message SavingsProductSearchRequest {
  string query = 1;
  string organization_id = 2 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  common.v1.PageCursor cursor = 3;
}

message SavingsProductSearchResponse {
  repeated SavingsProductObject data = 1;
}

// --- SavingsAccount ---

message SavingsAccountCreateRequest {
  SavingsAccountObject data = 1 [(buf.validate.field).required = true];
}

message SavingsAccountCreateResponse {
  SavingsAccountObject data = 1;
}

message SavingsAccountGetRequest {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
}

message SavingsAccountGetResponse {
  SavingsAccountObject data = 1;
}

message SavingsAccountSearchRequest {
  string query = 1;
  string owner_id = 2 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string product_id = 3 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string organization_id = 4 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  SavingsAccountStatus status = 5;
  common.v1.PageCursor cursor = 6;
}

message SavingsAccountSearchResponse {
  repeated SavingsAccountObject data = 1;
}

message SavingsAccountFreezeRequest {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
