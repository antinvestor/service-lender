}

message SavingsAccountFreezeResponse {
  SavingsAccountObject data = 1;
}

message SavingsAccountCloseRequest {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string reason = 2;
}

message SavingsAccountCloseResponse {
  SavingsAccountObject data = 1;
}

// --- Deposit ---

message DepositRecordRequest {
  string savings_account_id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  google.type.Money amount = 2;
  string payment_reference = 3;
  string channel = 4;
  string payer_reference = 5;
  string idempotency_key = 6;
}

message DepositRecordResponse {
  DepositObject data = 1;
}

message DepositGetRequest {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
}

message DepositGetResponse {
