  UnderwritingDecisionObject data = 1;
}

message UnderwritingDecisionGetRequest {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
}

message UnderwritingDecisionGetResponse {
  UnderwritingDecisionObject data = 1;
}

message UnderwritingDecisionSearchRequest {
  string application_id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  common.v1.PageCursor cursor = 2;
}

message UnderwritingDecisionSearchResponse {
  repeated UnderwritingDecisionObject data = 1;
}

// -----------------------------------------------------
// Origination Service
// -----------------------------------------------------

// OriginationService manages loan products, applications, documents,
// verification tasks, and underwriting decisions.
// All RPCs require authentication via Bearer token.
service OriginationService {
  option (common.v1.service_permissions) = {
    namespace: "service_origination"
    permissions: [
      "loan_product_view",
      "loan_product_manage",
      "application_view",
      "application_manage",
      "application_submit",
      "application_document_view",
      "application_document_manage",
      "verification_view",
      "verification_manage",
      "underwriting_view",
      "underwriting_manage"
    ]
    role_bindings: [
      {
        role: ROLE_OWNER
        permissions: [
          "loan_product_view",
          "loan_product_manage",
          "application_view",
          "application_manage",
          "application_submit",
          "application_document_view",
          "application_document_manage",
          "verification_view",
          "verification_manage",
          "underwriting_view",
          "underwriting_manage"
        ]
      },
      {
        role: ROLE_ADMIN
        permissions: [
          "loan_product_view",
          "loan_product_manage",
          "application_view",
          "application_manage",
          "application_submit",
          "application_document_view",
          "application_document_manage",
          "verification_view",
          "verification_manage",
          "underwriting_view",
          "underwriting_manage"
        ]
      },
      {
        role: ROLE_OPERATOR
        permissions: [
          "loan_product_view",
          "application_view",
          "application_manage",
          "application_submit",
          "application_document_view",
          "verification_view",
          "verification_manage",
          "underwriting_view"
        ]
      },
      {
        role: ROLE_VIEWER
        permissions: [
          "loan_product_view",
          "application_view",
          "application_document_view",
          "verification_view",
          "underwriting_view"
        ]
      },
      {
        role: ROLE_MEMBER
        permissions: [
          "loan_product_view",
          "application_view",
          "application_document_view",
          "verification_view",
          "underwriting_view"
        ]
      },
      {
        role: ROLE_SERVICE
        permissions: [
          "loan_product_view",
          "loan_product_manage",
          "application_view",
          "application_manage",
          "application_submit",
          "application_document_view",
          "application_document_manage",
          "verification_view",
          "verification_manage",
          "underwriting_view",
          "underwriting_manage"
        ]
      }
    ]
  };

  // LoanProductSave creates or updates a loan product.
  rpc LoanProductSave(LoanProductSaveRequest) returns (LoanProductSaveResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["loan_product_manage"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "loanProductSave"
      summary: "Create or update a loan product"
      description: "Creates a new loan product or updates an existing one. Loan products define terms, rates, fees, and eligibility criteria."
      tags: "LoanProducts"
    };
  }

  // LoanProductGet retrieves a loan product by its ID.
  rpc LoanProductGet(LoanProductGetRequest) returns (LoanProductGetResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["loan_product_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "loanProductGet"
      summary: "Get a loan product by ID"
      description: "Retrieves a loan product record by its unique identifier."
      tags: "LoanProducts"
    };
  }

  // LoanProductSearch finds loan products matching search criteria.
  rpc LoanProductSearch(LoanProductSearchRequest) returns (stream LoanProductSearchResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["loan_product_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "loanProductSearch"
      summary: "Search loan products"
      description: "Searches for loan products matching specified criteria. Supports filtering by bank and product type."
      tags: "LoanProducts"
    };
  }

  // ApplicationSave creates or updates a loan application.
  rpc ApplicationSave(ApplicationSaveRequest) returns (ApplicationSaveResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["application_manage"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "applicationSave"
      summary: "Create or update a loan application"
      description: "Creates a new loan application or updates an existing draft. Applications start in DRAFT status."
      tags: "Applications"
    };
  }

  // ApplicationGet retrieves an application by its ID.
  rpc ApplicationGet(ApplicationGetRequest) returns (ApplicationGetResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["application_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "applicationGet"
      summary: "Get an application by ID"
      description: "Retrieves a loan application record by its unique identifier."
      tags: "Applications"
    };
  }

  // ApplicationSearch finds applications matching search criteria.
  rpc ApplicationSearch(ApplicationSearchRequest) returns (stream ApplicationSearchResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["application_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "applicationSearch"
      summary: "Search applications"
      description: "Searches for applications matching specified criteria. Supports filtering by borrower, agent, branch, bank, and status."
      tags: "Applications"
    };
  }

  // ApplicationSubmit transitions a draft application to submitted status.
  rpc ApplicationSubmit(ApplicationSubmitRequest) returns (ApplicationSubmitResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["application_submit"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "applicationSubmit"
      summary: "Submit a draft application"
      description: "Transitions an application from DRAFT to SUBMITTED status, triggering the origination workflow."
      tags: "Applications"
    };
  }

  // ApplicationCancel cancels an application.
  rpc ApplicationCancel(ApplicationCancelRequest) returns (ApplicationCancelResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["application_manage"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "applicationCancel"
      summary: "Cancel an application"
      description: "Cancels a non-terminal application with a reason."
      tags: "Applications"
    };
