    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Optional filter by organization
  string parent_id = 3 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Optional filter by direct parent
  bool root_only = 4; // When true, returns only top-level org units with no parent
  OrgUnitType type = 5; // Optional type filter
  common.v1.PageCursor cursor = 6; // Pagination
}

message OrgUnitSearchResponse {
  repeated OrgUnitObject data = 1;
}

