// -----------------------------------------------------
// Request/Response Messages
// -----------------------------------------------------

// Organization messages
message OrganizationSaveRequest {
  OrganizationObject data = 1 [(buf.validate.field).required = true];
}

message OrganizationSaveResponse {
  OrganizationObject data = 1;
}

message OrganizationGetRequest {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
}

message OrganizationGetResponse {
  OrganizationObject data = 1;
}

message OrganizationSearchResponse {
  repeated OrganizationObject data = 1;
}

// Branch messages
message BranchSaveRequest {
  BranchObject data = 1 [(buf.validate.field).required = true];
}

message BranchSaveResponse {
  BranchObject data = 1;
}

message BranchGetRequest {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
}

message BranchGetResponse {
  BranchObject data = 1;
}

message BranchSearchRequest {
  string query = 1; // Free-text search
  string organization_id = 2 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Optional filter by organization
  common.v1.PageCursor cursor = 3; // Pagination
}

message BranchSearchResponse {
  repeated BranchObject data = 1;
}

// Org unit messages
message OrgUnitSaveRequest {
  OrgUnitObject data = 1 [(buf.validate.field).required = true];
}

message OrgUnitSaveResponse {
