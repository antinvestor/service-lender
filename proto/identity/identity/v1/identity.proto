syntax = "proto3";

package identity.v1;

// -----------------------------------------------------
// Core notes (normative):
// - Identity Service manages the organizational backbone of the system
// - Manages Organizations (partition mappings), Org Units (hierarchical sub-partitions with geo areas),
//   and System Users (verifiers, approvers, administrators, auditors)
// - Integrates with Profile and Partition ecosystem services
// - All timestamps are RFC3339 / google.protobuf.Timestamp
// -----------------------------------------------------

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "common/v1/permissions.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/struct.proto";
import "google/type/money.proto";

option go_package = "github.com/antinvestor/apis/go/identity/v1;identityv1";
option java_multiple_files = true;
option java_package = "identityv1";
option (gnostic.openapi.v3.document) = {
  info: {
    title: "Identity Service"
    version: "v1.0.0"
    description: "The Identity Service manages the organizational backbone of the system including organizations, hierarchical org units, and system users. Organizations map to partitions, org units represent typed sub-divisions with optional parent-child relationships, and system users are assigned roles for processing workflows."
    contact: {
      name: "Ant Investor Ltd"
      url: "https://github.com/antinvestor/service-fintech"
      email: "info@antinvestor.com"
    }
    license: {
      name: "Apache License"
      url: "https://github.com/antinvestor/apis/blob/master/LICENSE"
    }
  }
  components: {
    security_schemes: {
      additional_properties: [
        {
          name: "BearerAuth"
          value: {
            security_scheme: {
              type: "http"
              scheme: "bearer"
              bearer_format: "JWT"
            }
          }
        }
      ]
    }
  }
};

// -----------------------------------------------------
// Enumerations
// -----------------------------------------------------

// OrganizationType defines the kind of organization.
enum OrganizationType {
  ORGANIZATION_TYPE_UNSPECIFIED = 0;
  ORGANIZATION_TYPE_BANK = 1; // Traditional bank or financial institution
  ORGANIZATION_TYPE_MICROFINANCE = 2; // Microfinance institution
  ORGANIZATION_TYPE_SACCO = 3; // Savings and Credit Co-operative
  ORGANIZATION_TYPE_FINTECH = 4; // Fintech lending company
  ORGANIZATION_TYPE_COOPERATIVE = 5; // Cooperative society
  ORGANIZATION_TYPE_NGO = 6; // Non-governmental organization
  ORGANIZATION_TYPE_GOVERNMENT = 7; // Government lending program
  ORGANIZATION_TYPE_OTHER = 8; // Other organization type
}

// OrgUnitType defines the typed hierarchy under an organization.
enum OrgUnitType {
  ORG_UNIT_TYPE_UNSPECIFIED = 0;
  ORG_UNIT_TYPE_REGION = 1;
  ORG_UNIT_TYPE_ZONE = 2;
  ORG_UNIT_TYPE_AREA = 3;
  ORG_UNIT_TYPE_CLUSTER = 4;
  ORG_UNIT_TYPE_BRANCH = 5;
  ORG_UNIT_TYPE_OTHER = 6;
}

// SystemUserRole defines the role a system user plays in the lending workflow.
// Deprecated: use AccessRoleAssignmentObject for all authorization decisions.
enum SystemUserRole {
  SYSTEM_USER_ROLE_UNSPECIFIED = 0;
  SYSTEM_USER_ROLE_VERIFIER = 1; // Verifies loan applications and client data
  SYSTEM_USER_ROLE_APPROVER = 2; // Approves or rejects loan applications
  SYSTEM_USER_ROLE_ADMINISTRATOR = 3; // Manages system configuration and users
  SYSTEM_USER_ROLE_AUDITOR = 4; // Read-only access for compliance and audit
}

// WorkforceEngagementType defines how a workforce member is engaged.
enum WorkforceEngagementType {
  WORKFORCE_ENGAGEMENT_TYPE_UNSPECIFIED = 0;
  WORKFORCE_ENGAGEMENT_TYPE_EMPLOYEE = 1;
  WORKFORCE_ENGAGEMENT_TYPE_CONTRACTOR = 2;
  WORKFORCE_ENGAGEMENT_TYPE_SERVICE_ACCOUNT = 3;
}

// DepartmentKind separates top-level functions from nested departments.
enum DepartmentKind {
  DEPARTMENT_KIND_UNSPECIFIED = 0;
  DEPARTMENT_KIND_FUNCTION = 1;
  DEPARTMENT_KIND_DEPARTMENT = 2;
}

// TeamType defines the operational purpose of an internal team.
enum TeamType {
  TEAM_TYPE_UNSPECIFIED = 0;
  TEAM_TYPE_PORTFOLIO = 1;
  TEAM_TYPE_SERVICING = 2;
  TEAM_TYPE_COLLECTIONS = 3;
  TEAM_TYPE_SALES = 4;
  TEAM_TYPE_PILOT = 5;
  TEAM_TYPE_SHARED_SERVICE = 6;
}

// TeamMembershipRole defines a member's role inside a team.
enum TeamMembershipRole {
  TEAM_MEMBERSHIP_ROLE_UNSPECIFIED = 0;
  TEAM_MEMBERSHIP_ROLE_LEAD = 1;
  TEAM_MEMBERSHIP_ROLE_DEPUTY = 2;
  TEAM_MEMBERSHIP_ROLE_MEMBER = 3;
  TEAM_MEMBERSHIP_ROLE_SPECIALIST = 4;
}

// AccessScopeType defines the resource scope of an access role assignment.
enum AccessScopeType {
  ACCESS_SCOPE_TYPE_UNSPECIFIED = 0;
  ACCESS_SCOPE_TYPE_GLOBAL = 1;
  ACCESS_SCOPE_TYPE_ORGANIZATION = 2;
  ACCESS_SCOPE_TYPE_ORG_UNIT = 3;
  ACCESS_SCOPE_TYPE_TEAM = 4;
}

// DataVerificationStatus tracks the verification lifecycle of client KYC data.
enum DataVerificationStatus {
  DATA_VERIFICATION_STATUS_UNSPECIFIED = 0;
  DATA_VERIFICATION_STATUS_COLLECTED = 1;
  DATA_VERIFICATION_STATUS_UNDER_REVIEW = 2;
  DATA_VERIFICATION_STATUS_VERIFIED = 3;
  DATA_VERIFICATION_STATUS_REJECTED = 4;
  DATA_VERIFICATION_STATUS_MORE_INFO_NEEDED = 5;
  DATA_VERIFICATION_STATUS_EXPIRED = 6;
}

// FormFieldType defines the type of a form field.
enum FormFieldType {
  FORM_FIELD_TYPE_UNSPECIFIED = 0;
  FORM_FIELD_TYPE_TEXT = 1;
  FORM_FIELD_TYPE_NUMBER = 2;
  FORM_FIELD_TYPE_CURRENCY = 3;
  FORM_FIELD_TYPE_PHONE = 4;
  FORM_FIELD_TYPE_EMAIL = 5;
  FORM_FIELD_TYPE_DATE = 6;
  FORM_FIELD_TYPE_SELECT = 7;
  FORM_FIELD_TYPE_MULTI_SELECT = 8;
  FORM_FIELD_TYPE_PHOTO = 9;
  FORM_FIELD_TYPE_FILE = 10;
  FORM_FIELD_TYPE_LOCATION = 11;
  FORM_FIELD_TYPE_SIGNATURE = 12;
  FORM_FIELD_TYPE_CHECKBOX = 13;
  FORM_FIELD_TYPE_TEXTAREA = 14;
}

// FormFieldGroup categorizes fields for display and encryption.
enum FormFieldGroup {
  FORM_FIELD_GROUP_UNSPECIFIED = 0;
  FORM_FIELD_GROUP_PERSONAL = 1;
  FORM_FIELD_GROUP_FINANCIAL = 2;
  FORM_FIELD_GROUP_LEGAL = 3;
  FORM_FIELD_GROUP_DOCUMENTS = 4;
  FORM_FIELD_GROUP_LOCATION = 5;
}

// FormTemplateStatus defines the lifecycle state of a form template.
enum FormTemplateStatus {
  FORM_TEMPLATE_STATUS_UNSPECIFIED = 0;
  FORM_TEMPLATE_STATUS_DRAFT = 1;
  FORM_TEMPLATE_STATUS_PUBLISHED = 2;
  FORM_TEMPLATE_STATUS_ARCHIVED = 3;
}

// -----------------------------------------------------
// Entity Messages
// -----------------------------------------------------

// OrganizationObject represents a top-level institution mapped to a partition.
// This is a generic entity that can represent banks, microfinance institutions,
// SACCOs, fintechs, cooperatives, or any other organization type.
message OrganizationObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string partition_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Partition this organization maps to
  string name = 3 [(buf.validate.field).string.min_len = 1]; // Display name
  string code = 4 [(buf.validate.field).string.min_len = 1]; // Unique short code
  string profile_id = 5 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Associated profile ID
  common.v1.STATE state = 6; // Current state
  OrganizationType organization_type = 7; // Type of organization
  google.protobuf.Struct properties = 8; // Additional metadata
  string client_id = 9 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 40
  ]; // OAuth client ID for partition-scoped login (synced to Hydra)
  string geo_id = 10 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 40
  ]; // Geographic area identifier describing the organization's coverage
}

// OrgUnitObject represents a typed hierarchical unit within an organization.
// Org units can form a tree such as Region -> Zone -> Area -> Cluster -> Branch.
message OrgUnitObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string organization_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Root organization ID
  string parent_id = 3 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Optional parent org unit ID
  string partition_id = 4 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Partition this org unit maps to
  string name = 5 [(buf.validate.field).string.min_len = 1]; // Display name
  string code = 6 [(buf.validate.field).string.min_len = 1]; // Unique short code
  string geo_id = 7 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 40
  ]; // Geographic area identifier
  common.v1.STATE state = 8; // Current state
  OrgUnitType type = 9; // Typed hierarchy level
  google.protobuf.Struct properties = 10; // Additional metadata
  string client_id = 11 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 40
  ]; // OAuth client ID for partition-scoped login (synced to Hydra)
  bool has_children = 12; // Derived field indicating whether child units exist
}

// BranchObject is the legacy leaf-unit compatibility view.
// Canonical hierarchy management should use OrgUnitObject with type BRANCH.
message BranchObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string organization_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Parent organization ID
  string partition_id = 3 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Partition this branch maps to
  string name = 4 [(buf.validate.field).string.min_len = 1]; // Display name
  string code = 5 [(buf.validate.field).string.min_len = 1]; // Unique short code
  string geo_id = 6 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 40
  ]; // Geographic area identifier
  common.v1.STATE state = 7; // Current state
  google.protobuf.Struct properties = 8; // Additional metadata
  string client_id = 9 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 40
  ]; // OAuth client ID for partition-scoped login (synced to Hydra)
}

