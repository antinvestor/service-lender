syntax = "proto3";

package identity.v1;

// -----------------------------------------------------
// Core notes (normative):
// - Identity Service manages the organizational backbone of the system
// - Manages Organizations (partition mappings), Branches (sub-partitions with geo areas),
//   and System Users (verifiers, approvers, administrators, auditors)
// - Integrates with Profile and Partition ecosystem services
// - All timestamps are RFC3339 / google.protobuf.Timestamp
// -----------------------------------------------------

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "common/v1/permissions.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/antinvestor/apis/go/identity/v1;identityv1";
option java_multiple_files = true;
option java_package = "identityv1";
option (gnostic.openapi.v3.document) = {
  info: {
    title: "Lender Identity Service"
    version: "v1.0.0"
    description: "The Lender Identity Service manages the organizational backbone of the system including organizations, branches, and system users. Organizations map to partitions, branches represent sub-divisions with geographic areas, and system users are assigned roles for processing workflows."
    contact: {
      name: "Ant Investor Ltd"
      url: "https://github.com/antinvestor/service-lender"
      email: "info@antinvestor.com"
    }
    license: {
      name: "Apache License"
      url: "https://github.com/antinvestor/apis/blob/master/LICENSE"
    }
  }
  components: {
    security_schemes: {
      additional_properties: [
        {
          name: "BearerAuth"
          value: {
            security_scheme: {
              type: "http"
              scheme: "bearer"
              bearer_format: "JWT"
            }
          }
        }
      ]
    }
  }
};

// -----------------------------------------------------
// Enumerations
// -----------------------------------------------------

// OrganizationType defines the kind of organization.
enum OrganizationType {
  ORGANIZATION_TYPE_UNSPECIFIED = 0;
  ORGANIZATION_TYPE_BANK = 1;           // Traditional bank or financial institution
  ORGANIZATION_TYPE_MICROFINANCE = 2;   // Microfinance institution
  ORGANIZATION_TYPE_SACCO = 3;          // Savings and Credit Co-operative
  ORGANIZATION_TYPE_FINTECH = 4;        // Fintech lending company
  ORGANIZATION_TYPE_COOPERATIVE = 5;    // Cooperative society
  ORGANIZATION_TYPE_NGO = 6;            // Non-governmental organization
  ORGANIZATION_TYPE_GOVERNMENT = 7;     // Government lending program
  ORGANIZATION_TYPE_OTHER = 8;          // Other organization type
}

// SystemUserRole defines the role a system user plays in the lending workflow.
enum SystemUserRole {
  SYSTEM_USER_ROLE_UNSPECIFIED = 0;
  SYSTEM_USER_ROLE_VERIFIER = 1; // Verifies loan applications and client data
  SYSTEM_USER_ROLE_APPROVER = 2; // Approves or rejects loan applications
  SYSTEM_USER_ROLE_ADMINISTRATOR = 3; // Manages system configuration and users
  SYSTEM_USER_ROLE_AUDITOR = 4; // Read-only access for compliance and audit
}

// -----------------------------------------------------
// Entity Messages
// -----------------------------------------------------

// OrganizationObject represents a top-level institution mapped to a partition.
// This is a generic entity that can represent banks, microfinance institutions,
// SACCOs, fintechs, cooperatives, or any other organization type.
message OrganizationObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string partition_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Partition this organization maps to
  string name = 3 [(buf.validate.field).string.min_len = 1]; // Display name
  string code = 4 [(buf.validate.field).string.min_len = 1]; // Unique short code
  string profile_id = 5 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Associated profile ID
  common.v1.STATE state = 6; // Current state
  OrganizationType organization_type = 7; // Type of organization
  google.protobuf.Struct properties = 8; // Additional metadata
}

// BranchObject represents a branch within an organization, mapped to a child partition with a geographic area.
message BranchObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string organization_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Parent organization ID
  string partition_id = 3 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Partition this branch maps to
  string name = 4 [(buf.validate.field).string.min_len = 1]; // Display name
  string code = 5 [(buf.validate.field).string.min_len = 1]; // Unique short code
  string geo_id = 6 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 40
  ]; // Geographic area identifier
  common.v1.STATE state = 7; // Current state
  google.protobuf.Struct properties = 8; // Additional metadata
}

// InvestorObject represents an independent investor with a profile link.
// Investors are not assigned to agents — they exist independently.
message InvestorObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string profile_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Profile service user ID
  string name = 3 [(buf.validate.field).string.min_len = 1]; // Display name
  common.v1.STATE state = 4; // Current state
  google.protobuf.Struct properties = 5; // Additional metadata
}

// SystemUserObject represents a user with a specific role in the lending workflow.
message SystemUserObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string profile_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Profile service user ID
  string branch_id = 3 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Branch this user belongs to
  SystemUserRole role = 4; // User's role in the system
  string service_account_id = 5 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 40
  ]; // Optional service account for automated actions
  common.v1.STATE state = 6; // Current state
  google.protobuf.Struct properties = 7; // Additional metadata
}

// -----------------------------------------------------
// Request/Response Messages
// -----------------------------------------------------

// Organization messages
message OrganizationSaveRequest {
  OrganizationObject data = 1 [(buf.validate.field).required = true];
}

message OrganizationSaveResponse {
  OrganizationObject data = 1;
}

message OrganizationGetRequest {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
}

message OrganizationGetResponse {
  OrganizationObject data = 1;
}

message OrganizationSearchResponse {
  repeated OrganizationObject data = 1;
}

// Branch messages
message BranchSaveRequest {
  BranchObject data = 1 [(buf.validate.field).required = true];
}

message BranchSaveResponse {
  BranchObject data = 1;
}

message BranchGetRequest {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
}

message BranchGetResponse {
  BranchObject data = 1;
}

message BranchSearchRequest {
  string query = 1; // Free-text search
  string organization_id = 2 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Optional filter by organization
  common.v1.PageCursor cursor = 3; // Pagination
}

message BranchSearchResponse {
  repeated BranchObject data = 1;
}

// Investor messages
message InvestorSaveRequest {
  InvestorObject data = 1 [(buf.validate.field).required = true];
}

message InvestorSaveResponse {
  InvestorObject data = 1;
}

message InvestorGetRequest {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
}

message InvestorGetResponse {
  InvestorObject data = 1;
}

message InvestorSearchRequest {
  string query = 1; // Free-text search
  common.v1.PageCursor cursor = 2; // Pagination
}

message InvestorSearchResponse {
  repeated InvestorObject data = 1;
}

// SystemUser messages
message SystemUserSaveRequest {
  SystemUserObject data = 1 [(buf.validate.field).required = true];
}

message SystemUserSaveResponse {
  SystemUserObject data = 1;
}

message SystemUserGetRequest {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
}

message SystemUserGetResponse {
  SystemUserObject data = 1;
}

message SystemUserSearchRequest {
  string query = 1; // Free-text search
  SystemUserRole role = 2; // Optional filter by role
  string branch_id = 3 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // Optional filter by branch
  common.v1.PageCursor cursor = 4; // Pagination
}

message SystemUserSearchResponse {
  repeated SystemUserObject data = 1;
}

// -----------------------------------------------------
// Identity Service
// -----------------------------------------------------

// IdentityService manages organizations, branches, and system users for the platform.
// All RPCs require authentication via Bearer token.
service IdentityService {
  option (common.v1.service_permissions) = {
    namespace: "service_identity"
    permissions: [
      "organization_view",
      "organization_manage",
      "branch_view",
      "branch_manage",
      "investor_view",
      "investor_manage",
      "system_user_view",
      "system_user_manage"
    ]
    role_bindings: [
      {
        role: ROLE_OWNER
        permissions: [
          "organization_view",
          "organization_manage",
          "branch_view",
          "branch_manage",
          "investor_view",
          "investor_manage",
          "system_user_view",
          "system_user_manage"
        ]
      },
      {
        role: ROLE_ADMIN
        permissions: [
          "organization_view",
          "organization_manage",
          "branch_view",
          "branch_manage",
          "investor_view",
          "investor_manage",
          "system_user_view",
          "system_user_manage"
        ]
      },
      {
        role: ROLE_OPERATOR
        permissions: [
          "organization_view",
          "organization_manage",
          "branch_view",
          "branch_manage",
          "investor_view",
          "system_user_view"
        ]
      },
      {
        role: ROLE_VIEWER
        permissions: [
          "organization_view",
          "branch_view",
          "investor_view",
          "system_user_view"
        ]
      },
      {
        role: ROLE_MEMBER
        permissions: [
          "organization_view",
          "branch_view",
          "investor_view",
          "system_user_view"
        ]
      },
      {
        role: ROLE_SERVICE
        permissions: [
          "organization_view",
          "organization_manage",
          "branch_view",
          "branch_manage",
          "investor_view",
          "investor_manage",
          "system_user_view",
          "system_user_manage"
        ]
      }
    ]
  };

  // OrganizationSave creates or updates an organization record.
  rpc OrganizationSave(OrganizationSaveRequest) returns (OrganizationSaveResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["organization_manage"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "organizationSave"
      summary: "Create or update an organization"
      description: "Creates a new organization or updates an existing one. Organizations represent top-level institutions mapped to partitions."
      tags: "Organizations"
    };
  }

  // OrganizationGet retrieves an organization by its ID.
  rpc OrganizationGet(OrganizationGetRequest) returns (OrganizationGetResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["organization_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "organizationGet"
      summary: "Get an organization by ID"
      description: "Retrieves an organization record by its unique identifier."
      tags: "Organizations"
    };
  }

  // OrganizationSearch finds organizations matching search criteria.
  rpc OrganizationSearch(common.v1.SearchRequest) returns (stream OrganizationSearchResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["organization_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "organizationSearch"
      summary: "Search organizations"
      description: "Searches for organizations matching specified criteria. Returns a stream of matching organization records."
      tags: "Organizations"
    };
  }

  // BranchSave creates or updates a branch record.
  rpc BranchSave(BranchSaveRequest) returns (BranchSaveResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["branch_manage"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "branchSave"
      summary: "Create or update a branch"
      description: "Creates a new branch or updates an existing one. Branches represent sub-divisions of organizations with geographic areas."
      tags: "Branches"
    };
  }

  // BranchGet retrieves a branch by its ID.
  rpc BranchGet(BranchGetRequest) returns (BranchGetResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["branch_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "branchGet"
      summary: "Get a branch by ID"
      description: "Retrieves a branch record by its unique identifier."
      tags: "Branches"
    };
  }

  // BranchSearch finds branches matching search criteria.
  rpc BranchSearch(BranchSearchRequest) returns (stream BranchSearchResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["branch_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "branchSearch"
      summary: "Search branches"
      description: "Searches for branches matching specified criteria. Supports filtering by organization ID. Returns a stream of matching branch records."
      tags: "Branches"
    };
  }

  // InvestorSave creates or updates an investor record.
  rpc InvestorSave(InvestorSaveRequest) returns (InvestorSaveResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["investor_manage"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "investorSave"
      summary: "Create or update an investor"
      description: "Creates a new investor or updates an existing one. Investors are independent entities linked to a profile."
      tags: "Investors"
    };
  }

  // InvestorGet retrieves an investor by their ID.
  rpc InvestorGet(InvestorGetRequest) returns (InvestorGetResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["investor_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "investorGet"
      summary: "Get an investor by ID"
      description: "Retrieves an investor record by their unique identifier."
      tags: "Investors"
    };
  }

  // InvestorSearch finds investors matching search criteria.
  rpc InvestorSearch(InvestorSearchRequest) returns (stream InvestorSearchResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["investor_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "investorSearch"
      summary: "Search investors"
      description: "Searches for investors matching specified criteria. Returns a stream of matching investor records."
      tags: "Investors"
    };
  }

  // SystemUserSave creates or updates a system user record.
  rpc SystemUserSave(SystemUserSaveRequest) returns (SystemUserSaveResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["system_user_manage"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "systemUserSave"
      summary: "Create or update a system user"
      description: "Creates a new system user or updates an existing one. System users are assigned roles (verifier, approver, administrator, auditor) for processing workflows."
      tags: "SystemUsers"
    };
  }

  // SystemUserGet retrieves a system user by their ID.
  rpc SystemUserGet(SystemUserGetRequest) returns (SystemUserGetResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["system_user_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "systemUserGet"
      summary: "Get a system user by ID"
      description: "Retrieves a system user record by their unique identifier."
      tags: "SystemUsers"
    };
  }

  // SystemUserSearch finds system users matching search criteria.
  rpc SystemUserSearch(SystemUserSearchRequest) returns (stream SystemUserSearchResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["system_user_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "systemUserSearch"
      summary: "Search system users"
      description: "Searches for system users matching specified criteria. Supports filtering by role and branch. Returns a stream of matching system user records."
      tags: "SystemUsers"
    };
  }
}
