// -----------------------------------------------------
// ClientDataEntry Messages
// -----------------------------------------------------

// ClientDataEntryObject stores a single piece of client KYC data.
// Field keys are global identifiers shared across form templates.
// Verified data is reusable across multiple applications.
message ClientDataEntryObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string client_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string field_key = 3 [(buf.validate.field).string.min_len = 1]; // Global key e.g. "id_front_photo"
  string value = 4;                  // Text value or file reference ID
  string value_type = 5;             // "text", "number", "file", "photo", "signature", "location"
  DataVerificationStatus verification_status = 6;
  string reviewer_id = 7 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 40
  ]; // Profile ID of verifier
  string reviewer_comment = 8;       // Reason for rejection or more-info request
  string source_application_id = 9 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 40
  ]; // Which application collected this
  int32 revision = 10;               // Auto-incremented on resubmission
  string verified_at = 11;           // RFC3339 timestamp
  string expires_at = 12;            // RFC3339 timestamp (empty = never expires)
  google.protobuf.Struct properties = 13;
}

// ClientDataEntryHistoryObject tracks every action on a data entry.
message ClientDataEntryHistoryObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string entry_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // FK to ClientDataEntryObject
  int32 revision = 3;
  string value = 4;                  // Value at this revision
  string action = 5;                 // "submitted", "verified", "rejected", "more_info", "expired"
  string actor_id = 6 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 40
  ]; // Profile ID of who performed this
  string comment = 7;               // Reason/note
  string created_at = 8;            // RFC3339 timestamp
}

// Save/update client data (agent submitting)
message ClientDataSaveRequest {
  ClientDataEntryObject data = 1 [(buf.validate.field).required = true];
}
message ClientDataSaveResponse {
  ClientDataEntryObject data = 1;
}

// Get a single entry by client_id + field_key
message ClientDataGetRequest {
  string client_id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string field_key = 2 [(buf.validate.field).string.min_len = 1];
}
message ClientDataGetResponse {
  ClientDataEntryObject data = 1;
}

// List all entries for a client
message ClientDataListRequest {
  string client_id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  DataVerificationStatus verification_status = 2; // Optional filter
  common.v1.PageCursor cursor = 3;
}
message ClientDataListResponse {
  repeated ClientDataEntryObject data = 1;
}

// Verifier approves a data entry
message ClientDataVerifyRequest {
  string entry_id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string reviewer_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string comment = 3;
}
message ClientDataVerifyResponse {
  ClientDataEntryObject data = 1;
}

// Verifier rejects a data entry
message ClientDataRejectRequest {
  string entry_id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string reviewer_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string reason = 3 [(buf.validate.field).string.min_len = 1]; // Required: why it was rejected
}
message ClientDataRejectResponse {
  ClientDataEntryObject data = 1;
}

// Verifier requests more information
message ClientDataRequestInfoRequest {
  string entry_id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string reviewer_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string comment = 3 [(buf.validate.field).string.min_len = 1]; // Required: what's needed
}
message ClientDataRequestInfoResponse {
  ClientDataEntryObject data = 1;
}

// Get revision history for a data entry
message ClientDataHistoryRequest {
  string entry_id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
}
message ClientDataHistoryResponse {
  repeated ClientDataEntryHistoryObject data = 1;
}

// -----------------------------------------------------
// Identity Service
// -----------------------------------------------------

// IdentityService manages organizations, branches, and system users for the platform.
// All RPCs require authentication via Bearer token.
service IdentityService {
  option (common.v1.service_permissions) = {
    namespace: "service_identity"
    permissions: [
      "organization_view",
      "organization_manage",
      "branch_view",
      "branch_manage",
      "investor_view",
      "investor_manage",
      "system_user_view",
      "system_user_manage",
