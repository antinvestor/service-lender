// ClientDataEntry Messages
// -----------------------------------------------------

// FormFieldDefinition defines a single field in a form template.
message FormFieldDefinition {
  string key = 1; // Machine-readable key (e.g., "legal_name")
  string label = 2; // Human-readable label (e.g., "Legal Entity Name")
  FormFieldType field_type = 3; // Field type
  FormFieldGroup group = 4; // Field group for categorization
  bool required = 5; // Whether the field is mandatory
  string description = 6; // Help text shown below the field
  string placeholder = 7; // Placeholder text
  string default_value = 8; // Default value
  string validation_pattern = 9; // Regex validation pattern
  string validation_message = 10; // Custom validation error message
  repeated string options = 11; // Options for SELECT/MULTI_SELECT fields
  int32 min_length = 12; // Minimum length for text fields
  int32 max_length = 13; // Maximum length for text fields
  string min_value = 14; // Minimum value for number/currency fields
  string max_value = 15; // Maximum value for number/currency fields
  int32 order = 16; // Display order within the section
  string section = 17; // Section name for grouping fields into steps
  bool encrypted = 18; // Whether the field value should be encrypted at rest
  google.protobuf.Struct properties = 19; // Additional field configuration
}

// FormTemplateObject defines a reusable form schema for dynamic data collection.
//
// Form templates are the backbone of dynamic data collection across the
// platform. A single template can be used for loan origination KYC,
// client onboarding, group membership registration, investor KYC, or
// any other structured data collection requirement.
//
// The entity_type field determines which domain the template serves
// (e.g. "client", "agent", "investor", "group", "loan_request").
message FormTemplateObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string organization_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string name = 3 [(buf.validate.field).string.min_len = 1];
  string description = 4;
  int32 version = 5;
  FormTemplateStatus status = 6;
  repeated FormFieldDefinition fields = 7;
  repeated string sections = 8;
  google.protobuf.Struct validation_rules = 9;
  google.protobuf.Struct properties = 10;
  // The entity type this template is designed for. Used to filter
  // templates when loading requirements for a specific domain.
  // Standard values: "client", "agent", "investor", "group", "loan_request".
  string entity_type = 11;
}

// FormSubmissionObject captures filled form data for an entity.
//
// Submissions are linked to an owning entity via entity_id.
// The entity_type matches FormTemplateObject.entity_type.
message FormSubmissionObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string entity_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string entity_type = 3; // "client", "agent", "investor", "group", "loan_request"
  string template_id = 4 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  int32 template_version = 5;
  string submitted_by = 6 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 40
  ];
  google.protobuf.Struct data = 7;
  google.protobuf.Struct file_refs = 8;
  common.v1.STATE state = 9;
  google.protobuf.Struct properties = 10;
}

// ClientDataEntryObject stores a single piece of client KYC data.
// Field keys are global identifiers shared across form templates.
// Verified data is reusable across multiple applications.
message ClientDataEntryObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string client_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  string field_key = 3 [(buf.validate.field).string.min_len = 1]; // Global key e.g. "id_front_photo"
  string value = 4; // Text value or file reference ID
  string value_type = 5; // "text", "number", "file", "photo", "signature", "location"
  DataVerificationStatus verification_status = 6;
  string reviewer_id = 7 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 40
  ]; // Profile ID of verifier
  string reviewer_comment = 8; // Reason for rejection or more-info request
  string source_entity_id = 9 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 40
  ]; // Which entity collected this (loan request, client onboard, etc.)
  int32 revision = 10; // Auto-incremented on resubmission
  string verified_at = 11; // RFC3339 timestamp
  string expires_at = 12; // RFC3339 timestamp (empty = never expires)
  google.protobuf.Struct properties = 13;
}

// ClientDataEntryHistoryObject tracks every action on a data entry.
message ClientDataEntryHistoryObject {
  string id = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
  string entry_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ]; // FK to ClientDataEntryObject
  int32 revision = 3;
  string value = 4; // Value at this revision
  string action = 5; // "submitted", "verified", "rejected", "more_info", "expired"
  string actor_id = 6 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 40
  ]; // Profile ID of who performed this
  string comment = 7; // Reason/note
  string created_at = 8; // RFC3339 timestamp
}

