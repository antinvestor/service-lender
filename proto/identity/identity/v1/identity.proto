  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
}

message FormTemplateGetResponse {
  FormTemplateObject data = 1;
}

message FormTemplateSearchRequest {
  string query = 1;
  string organization_id = 2 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40
  ];
  FormTemplateStatus status = 3;
  common.v1.PageCursor cursor = 4;
  // Filter templates by entity type (e.g. "client", "group", "loan_request").
  string entity_type = 5;
}

message FormTemplateSearchResponse {
  repeated FormTemplateObject data = 1;
}

message FormTemplatePublishRequest {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ];
}

message FormTemplatePublishResponse {
  FormTemplateObject data = 1;
}

