syntax = "proto3";
package operations.v1;

import "common/v1/common.proto";
import "common/v1/permissions.proto";
import "google/protobuf/struct.proto";
import "google/type/money.proto";

option go_package = "github.com/antinvestor/apis/go/operations/v1;operationsv1";
option java_multiple_files = true;
option java_package = "operationsv1";

message TransferOrderObject {
  string id = 1;
  string debit_account_ref = 2;
  string credit_account_ref = 3;
  google.type.Money amount = 4;
  reserved 5;
  int32 order_type = 6;
  string reference = 7;
  string description = 8;
  google.protobuf.Struct extra_data = 9;
  common.v1.STATE state = 10;
}

message TransferOrderExecuteRequest {
  TransferOrderObject data = 1;
}
message TransferOrderExecuteResponse {
  TransferOrderObject data = 1;
}

message TransferOrderSearchRequest {
  string query = 1;
  int32 order_type = 2;
  common.v1.PageCursor cursor = 3;
}
message TransferOrderSearchResponse {
  repeated TransferOrderObject data = 1;
}

service OperationsService {
  option (common.v1.service_permissions) = {
    namespace: "service_operations"
    permissions: [
      "transfer_execute",
      "transfer_view"
    ]
    role_bindings: [
      {
        role: ROLE_OWNER
        permissions: [
          "transfer_execute",
          "transfer_view"
        ]
      },
      {
        role: ROLE_ADMIN
        permissions: [
          "transfer_execute",
          "transfer_view"
        ]
      },
      {
        role: ROLE_OPERATOR
        permissions: [
          "transfer_execute",
          "transfer_view"
        ]
      },
      {
        role: ROLE_VIEWER
        permissions: ["transfer_view"]
      },
      {
        role: ROLE_MEMBER
        permissions: ["transfer_view"]
      },
      {
        role: ROLE_SERVICE
        permissions: [
          "transfer_execute",
          "transfer_view"
        ]
      }
    ]
  };

  rpc TransferOrderExecute(TransferOrderExecuteRequest) returns (TransferOrderExecuteResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["transfer_execute"]
    };
  }
  rpc TransferOrderSearch(TransferOrderSearchRequest) returns (stream TransferOrderSearchResponse) {
    option (common.v1.method_permissions) = {
      permissions: ["transfer_view"]
    };
  }
}
