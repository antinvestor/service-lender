syntax = "proto3";

package limits.v1;

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "common/v1/permissions.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/type/money.proto";

option java_package = "limitsv1";

// ─── Enums ───────────────────────────────────────────────────────────

enum LimitAction {
  LIMIT_ACTION_UNSPECIFIED = 0;
  LIMIT_ACTION_LOAN_DISBURSEMENT = 1;
  LIMIT_ACTION_LOAN_REQUEST = 2;
  LIMIT_ACTION_LOAN_REPAYMENT = 3;
  LIMIT_ACTION_SAVINGS_DEPOSIT = 4;
  LIMIT_ACTION_SAVINGS_WITHDRAWAL = 5;
  LIMIT_ACTION_TRANSFER_ORDER_EXECUTE = 6;
  LIMIT_ACTION_INCOMING_PAYMENT = 7;
  LIMIT_ACTION_FUNDING_INFLOW = 8;
  LIMIT_ACTION_FUNDING_OUTFLOW = 9;
  LIMIT_ACTION_STAWI_CONTRIBUTION = 10;
  LIMIT_ACTION_STAWI_PAYOUT = 11;
}

enum SubjectType {
  SUBJECT_TYPE_UNSPECIFIED = 0;
  SUBJECT_TYPE_CLIENT = 1;
  SUBJECT_TYPE_ACCOUNT = 2;
  SUBJECT_TYPE_PRODUCT = 3;
  SUBJECT_TYPE_ORGANIZATION = 4;
  SUBJECT_TYPE_ORG_UNIT = 5;
  SUBJECT_TYPE_WORKFORCE_MEMBER = 6;
}

enum LimitKind {
  LIMIT_KIND_UNSPECIFIED = 0;
  LIMIT_KIND_PER_TXN_MIN = 1;
  LIMIT_KIND_PER_TXN_MAX = 2;
  LIMIT_KIND_ROLLING_WINDOW_AMOUNT = 3;
  LIMIT_KIND_ROLLING_WINDOW_COUNT = 4;
}

enum PolicyMode {
  POLICY_MODE_UNSPECIFIED = 0;
  POLICY_MODE_OFF = 1;
  POLICY_MODE_SHADOW = 2;
  POLICY_MODE_ENFORCE = 3;
}

enum PolicyScope {
  POLICY_SCOPE_UNSPECIFIED = 0;
  POLICY_SCOPE_PLATFORM = 1;
  POLICY_SCOPE_ORG = 2;
  POLICY_SCOPE_ORG_UNIT = 3;
}

enum ReservationStatus {
  RESERVATION_STATUS_UNSPECIFIED = 0;
  RESERVATION_STATUS_ACTIVE = 1;
  RESERVATION_STATUS_PENDING_APPROVAL = 2;
  RESERVATION_STATUS_COMMITTED = 3;
  RESERVATION_STATUS_RELEASED = 4;
  RESERVATION_STATUS_REVERSED = 5;
  RESERVATION_STATUS_EXPIRED = 6;
}

enum ApprovalStatus {
  APPROVAL_STATUS_UNSPECIFIED = 0;
  APPROVAL_STATUS_PENDING = 1;
  APPROVAL_STATUS_APPROVED = 2;
  APPROVAL_STATUS_REJECTED = 3;
  APPROVAL_STATUS_EXPIRED = 4;
  APPROVAL_STATUS_AUTO_REJECTED_ON_RECHECK = 5;
}

// ─── Shared messages ─────────────────────────────────────────────────

message SubjectRef {
  SubjectType type = 1 [(buf.validate.field).enum.defined_only = true];
  string id = 2 [(buf.validate.field).string.min_len = 1];
}

message ApproverTier {
  // Tier applies for amounts up to and including this value (in minor units).
  // The final tier may set up_to = 0 to mean "and above".
  int64 up_to = 1;
  string role = 2 [(buf.validate.field).string.min_len = 1];
  int32 approvers = 3 [
    (buf.validate.field).int32.gte = 1,
    (buf.validate.field).int32.lte = 11
  ];
}

message PolicyObject {
  string id = 1 [(buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE];
  string tenant_id = 2 [(buf.validate.field).string.min_len = 0];
  PolicyScope scope = 3 [(buf.validate.field).enum.defined_only = true];
  string org_unit_id = 4;
  LimitAction action = 5 [(buf.validate.field).enum.defined_only = true];
  SubjectType subject_type = 6 [(buf.validate.field).enum.defined_only = true];
  string currency_code = 7 [(buf.validate.field).string.max_len = 3];
  LimitKind limit_kind = 8 [(buf.validate.field).enum.defined_only = true];
  google.protobuf.Duration window = 9;
  google.type.Money cap_amount = 10;
  int64 cap_count = 11;
  PolicyMode mode = 12 [(buf.validate.field).enum.defined_only = true];
  google.protobuf.Struct attribute_filter = 13;
  repeated ApproverTier approver_tiers = 14;
  google.protobuf.Duration approval_ttl = 15;
  google.protobuf.Timestamp effective_from = 16;
  google.protobuf.Timestamp effective_to = 17;
  string notes = 18;
  int32 version = 19;
  google.protobuf.Timestamp created_at = 20;
  google.protobuf.Timestamp modified_at = 21;
}

message LimitIntent {
  LimitAction action = 1 [(buf.validate.field).enum.defined_only = true];
  string tenant_id = 2 [(buf.validate.field).string.min_len = 3];
  string org_unit_id = 3;
  google.type.Money amount = 4 [(buf.validate.field).required = true];
  repeated SubjectRef subjects = 5 [(buf.validate.field).repeated.min_items = 1];
  string maker_id = 6;
}

message PolicyVerdict {
  string policy_id = 1;
  int32 policy_version = 2;
  bool matched = 3;
  bool breached = 4;
  bool would_require_approval = 5;
  PolicyMode mode = 6;
  string reason = 7;
  google.type.Money current_usage = 8;
  google.type.Money cap_amount = 9;
  int64 current_count = 10;
  int64 cap_count = 11;
}

// ─── Admin service messages ──────────────────────────────────────────

message PolicySaveRequest {
  PolicyObject data = 1 [(buf.validate.field).required = true];
}
message PolicySaveResponse { PolicyObject data = 1; }

message PolicyGetRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}
message PolicyGetResponse { PolicyObject data = 1; }

message PolicySearchRequest {
  string query = 1;
  string tenant_id = 2;
  string org_unit_id = 3;
  LimitAction action = 4;
  SubjectType subject_type = 5;
  PolicyMode mode = 6;
  common.v1.PageCursor cursor = 7;
}
message PolicySearchResponse { repeated PolicyObject data = 1; }

message PolicyDeleteRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}
message PolicyDeleteResponse {}

message ApprovalDecisionObject {
  string approver_id = 1;
  string decision = 2;       // approve | reject
  string note = 3;
  google.protobuf.Timestamp decided_at = 4;
}

message ApprovalRequestObject {
  string id = 1;
  string reservation_id = 2;
  string tenant_id = 3;
  string org_unit_id = 4;
  string triggering_policy_id = 5;
  int32 policy_version = 6;
  LimitAction action = 7;
  google.type.Money amount = 8;
  string required_role = 9;
  int32 required_count = 10;
  string maker_id = 11;
  ApprovalStatus status = 12;
  google.protobuf.Timestamp submitted_at = 13;
  google.protobuf.Timestamp expires_at = 14;
  google.protobuf.Timestamp decided_at = 15;
  repeated ApprovalDecisionObject decisions = 16;
}

message ApprovalRequestListRequest {
  string tenant_id = 1;
  ApprovalStatus status = 2;
  string required_role = 3;
  common.v1.PageCursor cursor = 4;
}
message ApprovalRequestListResponse { repeated ApprovalRequestObject data = 1; }

message ApprovalRequestGetRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}
message ApprovalRequestGetResponse { ApprovalRequestObject data = 1; }

message ApprovalRequestDecideRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string decision = 2 [(buf.validate.field).string = {in: ["approve", "reject"]}];
  string note = 3;
}
message ApprovalRequestDecideResponse { ApprovalRequestObject data = 1; }

message LedgerEntryObject {
  string id = 1;
  string reservation_id = 2;
  string tenant_id = 3;
  string org_unit_id = 4;
  LimitAction action = 5;
  SubjectType subject_type = 6;
  string subject_id = 7;
  google.type.Money amount = 8;
  google.protobuf.Timestamp committed_at = 9;
  google.protobuf.Timestamp reversed_at = 10;
}

message LedgerSearchRequest {
  string tenant_id = 1;
  LimitAction action = 2;
  SubjectType subject_type = 3;
  string subject_id = 4;
  string currency_code = 5;
  google.protobuf.Timestamp from = 6;
  google.protobuf.Timestamp to = 7;
  common.v1.PageCursor cursor = 8;
}
message LedgerSearchResponse { repeated LedgerEntryObject data = 1; }

// ─── Runtime service messages (defined now, implemented in a future plan) ──

message CheckRequest { LimitIntent intent = 1 [(buf.validate.field).required = true]; }
message CheckResponse {
  bool allowed = 1;
  bool requires_approval = 2;
  int32 required_approvers = 3;
  string required_role = 4;
  repeated PolicyVerdict verdicts = 5;
  repeated string breached_policy_ids = 6;
}

message ReservationObject {
  string id = 1;
  string tenant_id = 2;
  string idempotency_key = 3;
  string org_unit_id = 4;
  LimitAction action = 5;
  google.type.Money amount = 6;
  repeated SubjectRef subjects = 7;
  string maker_id = 8;
  ReservationStatus status = 9;
  bool is_shadow = 10;
  google.protobuf.Timestamp reserved_at = 11;
  google.protobuf.Timestamp ttl_at = 12;
  google.protobuf.Timestamp committed_at = 13;
  google.protobuf.Timestamp released_at = 14;
}

message ReserveRequest {
  LimitIntent intent = 1 [(buf.validate.field).required = true];
  string idempotency_key = 2 [(buf.validate.field).string.min_len = 1];
  google.protobuf.Duration ttl = 3;
}
message ReserveResponse { ReservationObject reservation = 1; CheckResponse check = 2; }

message CommitRequest { string reservation_id = 1 [(buf.validate.field).string.min_len = 1]; }
message CommitResponse { ReservationObject reservation = 1; }

message ReleaseRequest { string reservation_id = 1 [(buf.validate.field).string.min_len = 1]; string reason = 2; }
message ReleaseResponse { ReservationObject reservation = 1; }

message ReverseRequest {
  string reservation_id = 1 [(buf.validate.field).string.min_len = 1];
  string idempotency_key = 2 [(buf.validate.field).string.min_len = 1];
  string reason = 3;
}
message ReverseResponse { ReservationObject original_reservation = 1; ReservationObject reversal_reservation = 2; }

// ─── Services ────────────────────────────────────────────────────────

service LimitsService {
  rpc Check(CheckRequest) returns (CheckResponse) {
    option (common.v1.method_permissions) = { permissions: ["limits_use"] };
  }
  rpc Reserve(ReserveRequest) returns (ReserveResponse) {
    option (common.v1.method_permissions) = { permissions: ["limits_use"] };
  }
  rpc Commit(CommitRequest) returns (CommitResponse) {
    option (common.v1.method_permissions) = { permissions: ["limits_use"] };
  }
  rpc Release(ReleaseRequest) returns (ReleaseResponse) {
    option (common.v1.method_permissions) = { permissions: ["limits_use"] };
  }
  rpc Reverse(ReverseRequest) returns (ReverseResponse) {
    option (common.v1.method_permissions) = { permissions: ["limits_use"] };
  }
}

service LimitsAdminService {
  option (common.v1.service_permissions) = {
    namespace: "service_limits"
    permissions: [
      "limits_use",
      "limits_policy_manage",
      "limits_policy_view",
      "limits_approval_view",
      "limits_approval_act",
      "limits_approval_override",
      "limits_ledger_view"
    ]
    role_bindings: [
      {
        role: ROLE_OWNER
        permissions: [
          "limits_use",
          "limits_policy_manage",
          "limits_policy_view",
          "limits_approval_view",
          "limits_approval_act",
          "limits_approval_override",
          "limits_ledger_view"
        ]
      },
      {
        role: ROLE_ADMIN
        permissions: [
          "limits_use",
          "limits_policy_manage",
          "limits_policy_view",
          "limits_approval_view",
          "limits_approval_act",
          "limits_approval_override",
          "limits_ledger_view"
        ]
      },
      {
        role: ROLE_OPERATOR
        permissions: [
          "limits_policy_view",
          "limits_approval_view",
          "limits_approval_act",
          "limits_ledger_view"
        ]
      },
      {
        role: ROLE_VIEWER
        permissions: [
          "limits_policy_view",
          "limits_approval_view",
          "limits_ledger_view"
        ]
      },
      {
        role: ROLE_MEMBER
        permissions: [
          "limits_policy_view",
          "limits_approval_view",
          "limits_ledger_view"
        ]
      },
      {
        role: ROLE_SERVICE
        permissions: [
          "limits_use"
        ]
      }
    ]
  };

  rpc PolicySave(PolicySaveRequest) returns (PolicySaveResponse) {
    option (common.v1.method_permissions) = { permissions: ["limits_policy_manage"] };
  }
  rpc PolicyGet(PolicyGetRequest) returns (PolicyGetResponse) {
    option (common.v1.method_permissions) = { permissions: ["limits_policy_view"] };
  }
  rpc PolicySearch(PolicySearchRequest) returns (stream PolicySearchResponse) {
    option (common.v1.method_permissions) = { permissions: ["limits_policy_view"] };
  }
  rpc PolicyDelete(PolicyDeleteRequest) returns (PolicyDeleteResponse) {
    option (common.v1.method_permissions) = { permissions: ["limits_policy_manage"] };
  }

  rpc ApprovalRequestList(ApprovalRequestListRequest) returns (stream ApprovalRequestListResponse) {
    option (common.v1.method_permissions) = { permissions: ["limits_approval_view"] };
  }
  rpc ApprovalRequestGet(ApprovalRequestGetRequest) returns (ApprovalRequestGetResponse) {
    option (common.v1.method_permissions) = { permissions: ["limits_approval_view"] };
  }
  rpc ApprovalRequestDecide(ApprovalRequestDecideRequest) returns (ApprovalRequestDecideResponse) {
    option (common.v1.method_permissions) = { permissions: ["limits_approval_act"] };
  }

  rpc LedgerSearch(LedgerSearchRequest) returns (stream LedgerSearchResponse) {
    option (common.v1.method_permissions) = { permissions: ["limits_ledger_view"] };
  }
}
